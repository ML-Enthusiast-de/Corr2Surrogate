project:
  name: corr2surrogate

privacy:
  local_only: true

data:
  private_dir: data/private
  allowed_extensions:
    - .csv
    - .xlsx
    - .xls

ingestion:
  infer_header: true
  header_confidence_threshold: 0.7
  prompt_on_uncertain_header: true
  prompt_on_multi_sheet: true

preprocessing:
  normalization:
    enabled: optional
    method: minmax
    feature_range:
      - 0.0
      - 1.0
    normalize_target: true
    persist_state: true
    inverse_target_on_inference: true

system_knowledge:
  critical_signals: []
  physically_required_signals: []
  non_virtualizable_signals: []
  notes: ""

modeling:
  optimizer: optuna
  save_best_params: true
  persist_artifacts: true
  forced_requests_allowed: true
  dependency_aware_ranking: true
  require_physical_dependency_for_virtual_signal: true
  agentic_loops:
    enabled: true
    max_attempts: 3
    min_relative_improvement: 0.02
    allow_architecture_switch: true
    allow_feature_set_expansion: true
    suggest_more_data_when_stalled: true

agent_behavior:
  always_inform_user: true
  ask_when_ambiguous: true
